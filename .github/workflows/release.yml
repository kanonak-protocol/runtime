# Test + publish the Kanonak runtime libraries to the public registries.
# Source of truth for connections/secrets: ../../release-targets.yml
#
# TEST jobs run on every PR / tag / dispatch (conformance against the golden
# vectors). PUBLISH jobs run only on a `v*` tag or a manual dispatch with
# publish=true, and run in the `production` GitHub Environment so (a) NuGet's
# trusted-publishing OIDC claim matches, and (b) you can gate releases behind a
# required-reviewer rule without blocking CI. Publish order is canonical -> codec
# -> expression -> wire (expression and wire have no dependency on the other
# members; they just ride the same pipeline).
#
# Trusted publishers (PyPI / crates.io / npm / NuGet) must each be configured
# with environment = production to match the OIDC claim these jobs present.
#
# Runner: ubuntu-latest, toolchains pinned via setup-* (Node-24 majors).

name: release

on:
  pull_request:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to the public registries (false = test only)"
        type: boolean
        default: false

permissions:
  id-token: write        # OIDC: PyPI / crates.io / npm provenance / NuGet trusted publishing
  contents: read
  attestations: write

defaults:
  run:
    shell: bash

jobs:
  # ======================= TEST (always) =======================
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: |
          python kanonak-canonical/python/conformance.py
          python kanonak-codec/python/conformance.py
          python kanonak-expression/python/conformance.py kanonak-expression/vectors
          python kanonak-wire/python/conformance.py kanonak-wire/vectors

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo test --manifest-path kanonak-canonical/rust/Cargo.toml
          cargo test --manifest-path kanonak-codec/rust/Cargo.toml
          cargo test --manifest-path kanonak-expression/rust/Cargo.toml
          cargo test --manifest-path kanonak-wire/rust/Cargo.toml

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - run: |
          (cd kanonak-canonical/go && go test ./...)
          (cd kanonak-codec/go && go test ./...)
          (cd kanonak-expression/go && go test ./...)
          (cd kanonak-wire/go && go test ./...)
      # Go has no registry/account: "publish" = push subdir tags
      # kanonak-canonical/go/vX.Y.Z, kanonak-codec/go/vX.Y.Z, kanonak-expression/go/vX.Y.Z,
      # kanonak-wire/go/vX.Y.Z; the proxy fetches.

  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22" }
      - run: npm install --no-audit --no-fund
      - run: |
          npm run build      -w @kanonak-protocol/canonical
          npm run typecheck  -w @kanonak-protocol/canonical
          npm run conformance -w @kanonak-protocol/canonical
          npm run build      -w @kanonak-protocol/codec
          npm run typecheck  -w @kanonak-protocol/codec
          npm run conformance -w @kanonak-protocol/codec
          npm run build      -w @kanonak-protocol/expression
          npm run typecheck  -w @kanonak-protocol/expression
          npm run conformance -w @kanonak-protocol/expression
          npm run build      -w @kanonak-protocol/wire
          npm run typecheck  -w @kanonak-protocol/wire
          npm run conformance -w @kanonak-protocol/wire

  test-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - run: |
          dotnet run -c Release --project kanonak-canonical/csharp/test/Kanonak.Canonical.Conformance -- "$PWD/kanonak-canonical/vectors"
          dotnet run -c Release --project kanonak-codec/csharp/test/Kanonak.Codec.Conformance -- "$PWD/kanonak-codec/vectors/codec-vectors.json"
          dotnet run -c Release --project kanonak-expression/csharp/test/Kanonak.Expression.Conformance -- "$PWD/kanonak-expression/vectors"
          dotnet run -c Release --project kanonak-wire/csharp/test/Kanonak.Wire.Conformance -- "$PWD/kanonak-wire/vectors"

  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - run: |
          cd kanonak-canonical/java
          javac -d out src/main/java/org/kanonak/canonical/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors
          cd ../../kanonak-codec/java
          javac -d out ../../kanonak-canonical/java/src/main/java/org/kanonak/canonical/*.java src/main/java/org/kanonak/codec/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors/codec-vectors.json
          cd ../../kanonak-expression/java
          javac -d out src/main/java/org/kanonak/expression/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors
          cd ../../kanonak-wire/java
          javac -d out src/main/java/org/kanonak/wire/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors

  # =============== PUBLISH (only on publish; gated by the production env) ===============
  publish-python:
    needs: test-python
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build kanonak-canonical/python && python -m build kanonak-codec/python && python -m build kanonak-expression/python && python -m build kanonak-wire/python
      - name: publish canonical (PyPI, OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-canonical/python/dist, skip-existing: true }
      - name: publish codec
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-codec/python/dist, skip-existing: true }
      - name: publish expression
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-expression/python/dist, skip-existing: true }
      - name: publish wire
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-wire/python/dist, skip-existing: true }

  publish-rust:
    needs: test-rust
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # crates.io has no "pending publisher", so the FIRST publish of a new crate
      # needs a token. If CARGO_REGISTRY_TOKEN is set, use it (one-time bootstrap);
      # otherwise use OIDC trusted publishing. After the first release, set up
      # Trusted Publishing on each crate and DELETE the secret -> auto-switches to OIDC.
      - name: detect publish auth
        id: cargocfg
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"; echo "Using CARGO_REGISTRY_TOKEN (one-time bootstrap)"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"; echo "Using OIDC trusted publishing"
          fi
      - name: crates.io auth (OIDC trusted publishing)
        if: steps.cargocfg.outputs.has_token != 'true'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: publish canonical then codec (skip versions already on crates.io)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' && secrets.CARGO_REGISTRY_TOKEN || steps.auth.outputs.token }}
        run: |
          pub() {
            local manifest="$1" crate ver
            crate=$(grep -m1 '^name = ' "$manifest" | sed -E 's/.*"(.*)".*/\1/')
            ver=$(grep -m1 '^version = ' "$manifest" | sed -E 's/.*"(.*)".*/\1/')
            if curl -sf -o /dev/null -A "kanonak-release-ci (https://github.com/kanonak-protocol/runtime)" "https://crates.io/api/v1/crates/$crate/$ver"; then
              echo "$crate@$ver already on crates.io - skipping"
            else
              cargo publish --manifest-path "$manifest"
              sleep 30   # let the index surface it before a dependent crate resolves it
            fi
          }
          pub kanonak-canonical/rust/Cargo.toml
          pub kanonak-codec/rust/Cargo.toml
          pub kanonak-expression/rust/Cargo.toml
          pub kanonak-wire/rust/Cargo.toml

  publish-typescript:
    needs: test-typescript
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", registry-url: "https://registry.npmjs.org" }
      - run: npm install --no-audit --no-fund
      - run: |
          npm run build -w @kanonak-protocol/canonical
          npm run build -w @kanonak-protocol/codec
          npm run build -w @kanonak-protocol/expression
          npm run build -w @kanonak-protocol/wire
      - name: publish canonical, codec, expression, wire (npm, provenance; skip already-published)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}   # or npm trusted publishing (drop the token)
        run: |
          for spec in "@kanonak-protocol/canonical:kanonak-canonical/typescript" "@kanonak-protocol/codec:kanonak-codec/typescript" "@kanonak-protocol/expression:kanonak-expression/typescript" "@kanonak-protocol/wire:kanonak-wire/typescript"; do
            name="${spec%%:*}"; dir="${spec##*:}"
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already published - skipping"
            else
              npm publish -w "$name" --provenance --access public
            fi
          done

  publish-csharp:
    needs: test-csharp
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - run: |
          dotnet pack -c Release kanonak-canonical/csharp/src/Kanonak.Canonical/Kanonak.Canonical.csproj
          dotnet pack -c Release kanonak-codec/csharp/src/Kanonak.Codec/Kanonak.Codec.csproj
          dotnet pack -c Release kanonak-expression/csharp/src/Kanonak.Expression/Kanonak.Expression.csproj
          dotnet pack -c Release kanonak-wire/csharp/src/Kanonak.Wire/Kanonak.Wire.csproj
      - name: NuGet trusted-publishing login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}   # repo Variable = kanonak-oss (the POLICY CREATOR account, NOT the org/package owner)
      - name: push canonical then codec (NuGet)
        run: |
          dotnet nuget push "kanonak-canonical/csharp/**/bin/Release/*.nupkg"  --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "kanonak-codec/csharp/**/bin/Release/*.nupkg"      --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "kanonak-expression/csharp/**/bin/Release/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "kanonak-wire/csharp/**/bin/Release/*.nupkg"       --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
        # Fallback if not using OIDC: replace the login step with a NUGET_API_KEY secret and
        # `--api-key ${{ secrets.NUGET_API_KEY }}`.

  publish-java:
    needs: test-java
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: deploy canonical then codec (Maven Central, signed)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ vars.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          deploy() {
            local pom="$1" artifact="$2" ver
            ver=$(grep -m1 '<version>' "$pom" | sed -E 's/.*<version>(.*)<\/version>.*/\1/')
            if curl -sf -o /dev/null "https://repo1.maven.org/maven2/org/kanonak/$artifact/$ver/$artifact-$ver.pom"; then
              echo "org.kanonak:$artifact:$ver already on Maven Central - skipping"
            else
              mvn -B -f "$pom" deploy -P release
            fi
          }
          deploy kanonak-canonical/java/pom.xml  kanonak-canonical
          deploy kanonak-codec/java/pom.xml      kanonak-codec
          deploy kanonak-expression/java/pom.xml kanonak-expression
          deploy kanonak-wire/java/pom.xml       kanonak-wire
