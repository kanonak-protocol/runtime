# Test + publish the Kanonak runtime libraries to the public registries.
# Source of truth for connections/secrets: ../../release-targets.yml
#
# TEST jobs run on every PR / tag / dispatch (conformance against the golden
# vectors). PUBLISH jobs run only on a `v*` tag or a manual dispatch with
# publish=true, and run in the `production` GitHub Environment so (a) NuGet's
# trusted-publishing OIDC claim matches, and (b) you can gate releases behind a
# required-reviewer rule without blocking CI. Publish order is canonical -> codec
# -> expression -> wire (expression and wire have no dependency on the other
# members; they just ride the same pipeline).
#
# Trusted publishers (PyPI / crates.io / npm / NuGet) must each be configured
# with environment = production to match the OIDC claim these jobs present.
#
# Runner: ubuntu-latest, toolchains pinned via setup-* (Node-24 majors).

name: release

on:
  pull_request:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to the public registries (false = test only)"
        type: boolean
        default: false

permissions:
  id-token: write        # OIDC: PyPI / crates.io / npm provenance / NuGet trusted publishing
  contents: read
  attestations: write

defaults:
  run:
    shell: bash

jobs:
  # ======================= TEST (always) =======================
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: |
          python kanonak-canonical/python/conformance.py
          python kanonak-codec/python/conformance.py
          python kanonak-expression/python/conformance.py kanonak-expression/vectors
          python kanonak-wire/python/conformance.py kanonak-wire/vectors

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo test --manifest-path kanonak-canonical/rust/Cargo.toml
          cargo test --manifest-path kanonak-codec/rust/Cargo.toml
          cargo test --manifest-path kanonak-expression/rust/Cargo.toml
          cargo test --manifest-path kanonak-wire/rust/Cargo.toml

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - run: |
          (cd kanonak-canonical/go && go test ./...)
          (cd kanonak-codec/go && go test ./...)
          (cd kanonak-expression/go && go test ./...)
          (cd kanonak-wire/go && go test ./...)
      # Go has no registry/account: "publish" = push subdir tags
      # kanonak-canonical/go/vX.Y.Z, kanonak-codec/go/vX.Y.Z, kanonak-expression/go/vX.Y.Z,
      # kanonak-wire/go/vX.Y.Z; the proxy fetches.

  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22" }
      - run: npm install --no-audit --no-fund
      - run: |
          npm run build      -w @kanonak-protocol/canonical
          npm run typecheck  -w @kanonak-protocol/canonical
          npm run conformance -w @kanonak-protocol/canonical
          npm run build      -w @kanonak-protocol/codec
          npm run typecheck  -w @kanonak-protocol/codec
          npm run conformance -w @kanonak-protocol/codec
          npm run build      -w @kanonak-protocol/expression
          npm run typecheck  -w @kanonak-protocol/expression
          npm run conformance -w @kanonak-protocol/expression
          npm run build      -w @kanonak-protocol/wire
          npm run typecheck  -w @kanonak-protocol/wire
          npm run conformance -w @kanonak-protocol/wire

  test-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - run: |
          dotnet run -c Release --project kanonak-canonical/csharp/test/Kanonak.Canonical.Conformance -- "$PWD/kanonak-canonical/vectors"
          # arg-less: the codec runner defaults to BOTH vector files (codec-vectors.json + codec-vectors-embedded.json)
          dotnet run -c Release --project kanonak-codec/csharp/test/Kanonak.Codec.Conformance
          # the typed surface (KanonakNode/Ref<T>/TypedNodes) against the same golden vectors
          dotnet run -c Release --project kanonak-codec/csharp/test/Kanonak.Codec.Typed.Conformance
          dotnet run -c Release --project kanonak-expression/csharp/test/Kanonak.Expression.Conformance -- "$PWD/kanonak-expression/vectors"
          dotnet run -c Release --project kanonak-wire/csharp/test/Kanonak.Wire.Conformance -- "$PWD/kanonak-wire/vectors"

  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - run: |
          cd kanonak-canonical/java
          javac -d out src/main/java/org/kanonak/canonical/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors
          cd ../../kanonak-codec/java
          javac -d out ../../kanonak-canonical/java/src/main/java/org/kanonak/canonical/*.java src/main/java/org/kanonak/codec/*.java conformance/Conformance.java conformance/TypedConformance.java
          # arg-less: the codec runner defaults to BOTH vector files (codec-vectors.json + codec-vectors-embedded.json)
          java -cp out Conformance
          # the typed surface (KanonakNode/Ref<T>/TypedNodes) against the same golden vectors
          java -cp out TypedConformance
          cd ../../kanonak-expression/java
          javac -d out src/main/java/org/kanonak/expression/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors
          cd ../../kanonak-wire/java
          javac -d out src/main/java/org/kanonak/wire/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors

  # The Swift ports (KanonakCanonical + KanonakCodec, behind the root
  # Package.swift). Swift has NO registry: SwiftPM resolves a public git URL
  # against ROOT semver tags, so A RELEASE IS THE REPO'S COORDINATED `v*` TAG
  # itself — no publish job exists or is needed; this test job gates the tag.
  # The first Swift-consumable version is the first `v*` tag whose tree
  # contains Package.swift (earlier tags predate it and cannot resolve).
  test-swift:
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v6
      - run: swift test

  # The 7th codec port: the Rust reference compiled to a wasm32-wasip2 component
  # behind the kanonak:codec WIT interface, driven through the SAME golden
  # vectors by a jco-transpiled Node host. Gates publish-wasm (GHCR OCI).
  test-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-wasip2 }
      - uses: actions/setup-node@v6
        with: { node-version: "22" }
      - run: cargo build --manifest-path kanonak-codec/wasm/Cargo.toml --target wasm32-wasip2 --release
      - run: |
          cd kanonak-codec/wasm/conformance
          npm install --no-audit --no-fund
          npm run conformance

  # =============== PUBLISH (only on publish; gated by the production env) ===============
  publish-python:
    needs: test-python
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build kanonak-canonical/python && python -m build kanonak-codec/python && python -m build kanonak-expression/python && python -m build kanonak-wire/python
      - name: publish canonical (PyPI, OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-canonical/python/dist, skip-existing: true }
      - name: publish codec
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-codec/python/dist, skip-existing: true }
      - name: publish expression
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-expression/python/dist, skip-existing: true }
      - name: publish wire
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-wire/python/dist, skip-existing: true }

  publish-rust:
    needs: test-rust
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # crates.io has no "pending publisher", so the FIRST publish of a new crate
      # needs a token. If CARGO_REGISTRY_TOKEN is set, use it (one-time bootstrap);
      # otherwise use OIDC trusted publishing. After the first release, set up
      # Trusted Publishing on each crate and DELETE the secret -> auto-switches to OIDC.
      - name: detect publish auth
        id: cargocfg
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"; echo "Using CARGO_REGISTRY_TOKEN (one-time bootstrap)"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"; echo "Using OIDC trusted publishing"
          fi
      - name: crates.io auth (OIDC trusted publishing)
        if: steps.cargocfg.outputs.has_token != 'true'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: publish canonical then codec (skip versions already on crates.io)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' && secrets.CARGO_REGISTRY_TOKEN || steps.auth.outputs.token }}
        run: |
          pub() {
            local manifest="$1" crate ver
            crate=$(grep -m1 '^name = ' "$manifest" | sed -E 's/.*"(.*)".*/\1/')
            ver=$(grep -m1 '^version = ' "$manifest" | sed -E 's/.*"(.*)".*/\1/')
            if curl -sf -o /dev/null -A "kanonak-release-ci (https://github.com/kanonak-protocol/runtime)" "https://crates.io/api/v1/crates/$crate/$ver"; then
              echo "$crate@$ver already on crates.io - skipping"
            else
              cargo publish --manifest-path "$manifest"
              sleep 30   # let the index surface it before a dependent crate resolves it
            fi
          }
          pub kanonak-canonical/rust/Cargo.toml
          pub kanonak-codec/rust/Cargo.toml
          pub kanonak-expression/rust/Cargo.toml
          pub kanonak-wire/rust/Cargo.toml

  publish-typescript:
    needs: test-typescript
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", registry-url: "https://registry.npmjs.org" }
      - run: npm install --no-audit --no-fund
      - run: |
          npm run build -w @kanonak-protocol/canonical
          npm run build -w @kanonak-protocol/codec
          npm run build -w @kanonak-protocol/expression
          npm run build -w @kanonak-protocol/wire
      - name: publish canonical, codec, expression, wire (npm, provenance; skip already-published)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}   # or npm trusted publishing (drop the token)
        run: |
          # IDEMPOTENT RE-RUNS: `npm view` reads a replica that can lag a fresh
          # publish by minutes (proven 2026-07-03: wire@0.1.0 published in one run
          # was invisible to `npm view` in the next, and the blind publish died on
          # E403). So the pre-check is an optimization only; the AUTHORITATIVE
          # duplicate rejection from the write path is also treated as success.
          for spec in "@kanonak-protocol/canonical:kanonak-canonical/typescript" "@kanonak-protocol/codec:kanonak-codec/typescript" "@kanonak-protocol/expression:kanonak-expression/typescript" "@kanonak-protocol/wire:kanonak-wire/typescript"; do
            name="${spec%%:*}"; dir="${spec##*:}"
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already published - skipping"
              continue
            fi
            if out=$(npm publish -w "$name" --provenance --access public 2>&1); then
              echo "$out"
              continue
            fi
            echo "$out"
            if grep -qiE "cannot publish over the previously published versions|EPUBLISHCONFLICT" <<<"$out"; then
              echo "$name@$ver already published (registry replica lag beat the pre-check) - continuing"
            else
              exit 1
            fi
          done

  publish-csharp:
    needs: test-csharp
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - run: |
          dotnet pack -c Release kanonak-canonical/csharp/src/Kanonak.Canonical/Kanonak.Canonical.csproj
          dotnet pack -c Release kanonak-codec/csharp/src/Kanonak.Codec/Kanonak.Codec.csproj
          dotnet pack -c Release kanonak-expression/csharp/src/Kanonak.Expression/Kanonak.Expression.csproj
          dotnet pack -c Release kanonak-wire/csharp/src/Kanonak.Wire/Kanonak.Wire.csproj
      - name: NuGet trusted-publishing login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}   # repo Variable = kanonak-oss (the POLICY CREATOR account, NOT the org/package owner)
      - name: push canonical then codec (NuGet)
        run: |
          dotnet nuget push "kanonak-canonical/csharp/**/bin/Release/*.nupkg"  --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "kanonak-codec/csharp/**/bin/Release/*.nupkg"      --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "kanonak-expression/csharp/**/bin/Release/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "kanonak-wire/csharp/**/bin/Release/*.nupkg"       --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
        # Fallback if not using OIDC: replace the login step with a NUGET_API_KEY secret and
        # `--api-key ${{ secrets.NUGET_API_KEY }}`.

  publish-java:
    needs: test-java
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: deploy canonical then codec (Maven Central, signed)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ vars.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          # IDEMPOTENT RE-RUNS: repo1.maven.org is a MIRROR that lags the Central
          # Portal by minutes-to-hours after a publish (proven 2026-07-03: wire
          # 0.1.0 published in one run was invisible to repo1 in the next, and the
          # re-deploy died with "Deployment <id> failed while publishing"). The
          # repo1 pre-check is an optimization only; on deploy failure we ask the
          # Portal's AUTHORITATIVE status API whether the failure is a duplicate
          # ("already published/exists") and continue if so — anything else still
          # fails loudly with the Portal's errors printed.
          deploy() {
            local pom="$1" artifact="$2" ver out dep_id token status
            ver=$(grep -m1 '<version>' "$pom" | sed -E 's/.*<version>(.*)<\/version>.*/\1/')
            if curl -sf -o /dev/null "https://repo1.maven.org/maven2/org/kanonak/$artifact/$ver/$artifact-$ver.pom"; then
              echo "org.kanonak:$artifact:$ver already on Maven Central - skipping"
              return 0
            fi
            if out=$(mvn -B -f "$pom" deploy -P release 2>&1); then
              echo "$out" | tail -n 15
              return 0
            fi
            echo "$out" | tail -n 60
            dep_id=$(grep -oE "Deployment [0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}" <<<"$out" | head -1 | awk '{print $2}')
            if [ -n "$dep_id" ]; then
              token=$(printf "%s:%s" "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 -w0)
              status=$(curl -s --request POST --header "Authorization: Bearer $token" "https://central.sonatype.com/api/v1/publisher/status?id=$dep_id")
              echo "Portal status for deployment $dep_id: $status"
              if grep -qiE "already (published|exists)" <<<"$status"; then
                echo "org.kanonak:$artifact:$ver already published (repo1 mirror lag beat the pre-check) - continuing"
                return 0
              fi
            fi
            return 1
          }
          deploy kanonak-canonical/java/pom.xml  kanonak-canonical
          deploy kanonak-codec/java/pom.xml      kanonak-codec
          deploy kanonak-expression/java/pom.xml kanonak-expression
          deploy kanonak-wire/java/pom.xml       kanonak-wire

  # Go has NO registry: A RELEASE IS A GIT TAG (`kanonak-<member>/go/vX.Y.Z`)
  # that proxy.golang.org fetches on first `go get` and then caches IMMUTABLY,
  # forever. GitHub "Releases" are irrelevant; plain tags are the whole
  # mechanism. This job makes tagging part of the machinery — the manual step
  # was forgotten for expression 0.1.0 (found 2026-07-03), and a missing tag
  # is SILENT drift (consumers get unpinned pseudo-versions, no error).
  # Versions come from meta.go_module_versions in release-targets.yml.
  # Idempotent: an existing tag is NEVER touched or moved (immutability rule);
  # to release a new Go version, bump go_module_versions and re-run.
  publish-go:
    needs: test-go
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    permissions:
      contents: write        # push the module tags with GITHUB_TOKEN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: tag go modules (skip existing — proxy-cached tags are immutable)
        run: |
          python3 -m pip install --quiet pyyaml
          for m in canonical codec expression wire; do
            ver=$(python3 -c "import yaml; print(yaml.safe_load(open('release-targets.yml'))['meta']['go_module_versions']['$m'])")
            tag="kanonak-$m/go/v$ver"
            if [ ! -f "kanonak-$m/go/go.mod" ]; then
              echo "::error::kanonak-$m/go/go.mod not found — module layout changed; fix release.yml + release-targets.yml before releasing"
              exit 1
            fi
            if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
              echo "$tag already exists - skipping (immutable once the proxy serves it; bump go_module_versions for a new release)"
            else
              git tag "$tag" "$GITHUB_SHA"
              git push origin "refs/tags/$tag"
              echo "pushed $tag @ $GITHUB_SHA"
            fi
          done

  # The Wasm component (the 7th codec port) has no language-native registry —
  # the Component-Model ecosystem distributes via OCI artifacts (warg is
  # archived; wkg/oras pull from any OCI registry). GHCR is the public,
  # repo-co-located OCI registry: publish a wkg-format Wasm OCI Artifact at
  # ghcr.io/kanonak-protocol/codec:<version> (tag = the codec version, so the
  # native codec and the component ship as one coordinated release).
  # Idempotent: an existing tag is never re-pushed (release tags are
  # immutable; bump the wasm crate version with the native codec instead).
  # ONE-TIME registry-side step after the FIRST publish: set the org package
  # ghcr.io/kanonak-protocol/codec to PUBLIC (org > Packages > codec >
  # package settings) — GHCR creates org packages private, and anonymous
  # `wkg oci pull` is the acceptance bar. release-audit hard-fails until then.
  publish-wasm:
    needs: test-wasm
    if: ${{ github.event_name == 'push' || inputs.publish }}
    environment: production
    permissions:
      contents: read
      packages: write        # push the OCI artifact with the workflow GITHUB_TOKEN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-wasip2 }
      - name: install wkg (pinned)
        run: |
          curl -sSfL -o wkg "https://github.com/bytecodealliance/wasm-pkg-tools/releases/download/v0.15.1/wkg-x86_64-unknown-linux-gnu"
          chmod +x wkg && sudo mv wkg /usr/local/bin/wkg
          wkg --version
      - run: cargo build --manifest-path kanonak-codec/wasm/Cargo.toml --target wasm32-wasip2 --release
      - name: push component to GHCR (skip existing — release tags are immutable)
        env:
          WKG_OCI_USERNAME: ${{ github.actor }}
          WKG_OCI_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver=$(grep -m1 '^version = ' kanonak-codec/wasm/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          ref="ghcr.io/kanonak-protocol/codec:$ver"
          # AUTHENTICATED existence pre-check, so idempotency holds even while
          # the package is still private (before the one-time visibility flip).
          tok=$(curl -sf -u "${WKG_OCI_USERNAME}:${WKG_OCI_PASSWORD}" "https://ghcr.io/token?scope=repository:kanonak-protocol/codec:pull" | jq -r .token)
          if curl -sf -o /dev/null -H "Authorization: Bearer $tok" \
               -H "Accept: application/vnd.oci.image.manifest.v1+json, application/vnd.oci.image.index.v1+json" \
               "https://ghcr.io/v2/kanonak-protocol/codec/manifests/$ver"; then
            echo "$ref already exists - skipping (immutable release tag; bump the version for a new release)"
          else
            wkg oci push "$ref" kanonak-codec/wasm/target/wasm32-wasip2/release/kanonak_codec_wasm.wasm \
              --annotation "org.opencontainers.image.source=https://github.com/kanonak-protocol/runtime" \
              --annotation "org.opencontainers.image.description=kanonak-codec as a Wasm component (kanonak:codec WIT interface), conformance-locked to the shared golden vectors" \
              --annotation "org.opencontainers.image.licenses=Apache-2.0"
            echo "pushed $ref"
          fi

  # RELEASE AUDIT — the cold-start truth check. Reads each member's expected
  # version from the COMMITTED manifests (repo state is the only memory; no
  # context carried in heads) and verifies presence on every registry + the Go
  # tag. Classification is deliberate:
  #   - AUTHORITATIVE sources (PyPI JSON API, crates.io API, git tags via
  #     ls-remote): MISSING => hard fail with a pointer to what to check.
  #   - MIRROR/REPLICA-backed reads (npm replicas, NuGet CDN index,
  #     repo1.maven.org): these lag a fresh publish by minutes-to-hours, so
  #     after retries a miss reports PENDING as a loud notice, NOT a failure —
  #     the publish job in this same run was the authoritative signal. Re-run
  #     the workflow later (fully idempotent) to see the audit go all-OK.
  release-audit:
    needs: [publish-python, publish-rust, publish-typescript, publish-csharp, publish-java, publish-go, publish-wasm]
    if: ${{ always() && (github.event_name == 'push' || inputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: audit all members x all registries + go tags
        run: |
          python3 -m pip install --quiet pyyaml
          fail=0; pend=0
          retry() { local n=$1 s=$2; shift 2; local i
            for i in $(seq 1 "$n"); do "$@" && return 0; [ "$i" -lt "$n" ] && sleep "$s"; done
            return 1
          }
          for m in canonical codec expression wire; do
            # Expected versions = the committed manifests (cold-start truth).
            py_ver=$(grep -m1 '^version' "kanonak-$m/python/pyproject.toml" | sed -E 's/.*"(.*)".*/\1/')
            rs_ver=$(grep -m1 '^version' "kanonak-$m/rust/Cargo.toml" | sed -E 's/.*"(.*)".*/\1/')
            ts_ver=$(jq -r .version "kanonak-$m/typescript/package.json")
            cs_ver=$(grep -m1 -h '<Version>' kanonak-$m/csharp/src/*/*.csproj | sed -E 's/.*<Version>(.*)<\/Version>.*/\1/')
            jv_ver=$(grep -m1 '<version>' "kanonak-$m/java/pom.xml" | sed -E 's/.*<version>(.*)<\/version>.*/\1/')
            go_ver=$(python3 -c "import yaml; print(yaml.safe_load(open('release-targets.yml'))['meta']['go_module_versions']['$m'])")

            if retry 3 15 curl -sf -o /dev/null "https://pypi.org/pypi/kanonak-$m/$py_ver/json"; then
              echo "OK       PyPI          kanonak-$m $py_ver"
            else
              echo "::error::MISSING PyPI kanonak-$m $py_ver — check publish-python + the PyPI trusted publisher (MUST be configured with environment=production)"; fail=1
            fi

            if retry 3 15 curl -sf -o /dev/null -A "kanonak-release-audit (https://github.com/kanonak-protocol/runtime)" "https://crates.io/api/v1/crates/kanonak-$m/$rs_ver"; then
              echo "OK       crates.io     kanonak-$m $rs_ver"
            else
              echo "::error::MISSING crates.io kanonak-$m $rs_ver — check publish-rust (a brand-NEW crate's first publish needs the CARGO_REGISTRY_TOKEN bootstrap)"; fail=1
            fi

            if retry 3 20 sh -c "curl -sf 'https://registry.npmjs.org/@kanonak-protocol%2f$m' | jq -e '.versions[\"$ts_ver\"]' >/dev/null"; then
              echo "OK       npm           @kanonak-protocol/$m $ts_ver"
            else
              echo "::notice::PENDING npm @kanonak-protocol/$m $ts_ver — replica lag is normal minutes after a fresh publish; re-run this workflow later to confirm"; pend=1
            fi

            if retry 3 20 sh -c "curl -sf 'https://api.nuget.org/v3-flatcontainer/kanonak.$m/index.json' | jq -e '.versions | index(\"$cs_ver\")' >/dev/null"; then
              echo "OK       NuGet         Kanonak.$m $cs_ver"
            else
              echo "::notice::PENDING NuGet Kanonak.$m $cs_ver — CDN index lag is normal after a fresh publish; re-run later to confirm"; pend=1
            fi

            if retry 3 20 curl -sf -o /dev/null "https://repo1.maven.org/maven2/org/kanonak/kanonak-$m/$jv_ver/kanonak-$m-$jv_ver.pom"; then
              echo "OK       MavenCentral  org.kanonak:kanonak-$m $jv_ver"
            else
              echo "::notice::PENDING Maven org.kanonak:kanonak-$m $jv_ver — repo1 mirrors the Central Portal minutes-to-hours behind; if publish-java is green the Portal accepted it. Re-run later to confirm"; pend=1
            fi

            if git ls-remote --tags origin "refs/tags/kanonak-$m/go/v$go_ver" | grep -q .; then
              echo "OK       Go            kanonak-$m/go v$go_ver (tag present)"
            else
              echo "::error::MISSING Go tag kanonak-$m/go/v$go_ver — publish-go should have pushed it; check that job's log"; fail=1
            fi
          done

          # GHCR (the codec wasm component) — AUTHORITATIVE registry API, and
          # checked ANONYMOUSLY on purpose: the acceptance bar is that a third
          # party with no auth can `wkg oci pull` it. Hard-fails until the
          # one-time public-visibility flip on the org package is done.
          wasm_ver=$(grep -m1 '^version = ' kanonak-codec/wasm/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          tok=$(curl -sf "https://ghcr.io/token?scope=repository:kanonak-protocol/codec:pull" | jq -r .token)
          if retry 3 15 curl -sf -o /dev/null -H "Authorization: Bearer $tok" -H "Accept: application/vnd.oci.image.manifest.v1+json, application/vnd.oci.image.index.v1+json" "https://ghcr.io/v2/kanonak-protocol/codec/manifests/$wasm_ver"; then
            echo "OK       GHCR          ghcr.io/kanonak-protocol/codec:$wasm_ver (wasm component, anonymously pullable)"
          else
            echo "::error::MISSING GHCR ghcr.io/kanonak-protocol/codec:$wasm_ver — check publish-wasm, and that the org package is set PUBLIC (one-time step: org > Packages > codec > package settings; GHCR creates org packages private)"; fail=1
          fi

          if [ "$pend" = "1" ]; then
            echo "::notice::Some mirror-backed registries report PENDING. The workflow is fully idempotent — re-run it (publish=true is safe) later and the audit should be all-OK."
          fi
          exit $fail
