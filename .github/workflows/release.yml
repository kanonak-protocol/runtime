# Test + publish the Kanonak runtime libraries to the public registries.
# Source of truth for connections/secrets: ../../release-targets.yml
#
# Every job RUNS CONFORMANCE (against the shared golden vectors) first; publish
# steps only run on a `v*` tag or a manual dispatch with publish=true, and always
# in the order canonical -> codec.
#
# Runner: ubuntu-latest, toolchains pinned via setup-* actions to match what the
# libraries are verified against (Python 3.12, Node 22, Go (go.mod), Temurin 17,
# .NET 8, Rust stable).

name: release

on:
  pull_request:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to the public registries (false = test only)"
        type: boolean
        default: false

permissions:
  id-token: write        # OIDC: PyPI / crates.io trusted publishing, npm provenance, attestations
  contents: read
  attestations: write

env:
  DO_PUBLISH: ${{ github.event_name == 'push' || inputs.publish }}

defaults:
  run:
    shell: bash

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install build
      - name: conformance
        run: |
          python kanonak-canonical/python/conformance.py
          python kanonak-codec/python/conformance.py
      - run: python -m build kanonak-canonical/python && python -m build kanonak-codec/python
      - name: publish canonical (PyPI, OIDC trusted publishing)
        if: env.DO_PUBLISH == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-canonical/python/dist }
      - name: publish codec
        if: env.DO_PUBLISH == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: kanonak-codec/python/dist }

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: conformance
        run: |
          cargo test --manifest-path kanonak-canonical/rust/Cargo.toml
          cargo test --manifest-path kanonak-codec/rust/Cargo.toml
      - name: crates.io auth (OIDC trusted publishing)
        if: env.DO_PUBLISH == 'true'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: publish canonical then codec
        if: env.DO_PUBLISH == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish --manifest-path kanonak-canonical/rust/Cargo.toml
          sleep 30   # let the index surface canonical before codec resolves it
          cargo publish --manifest-path kanonak-codec/rust/Cargo.toml

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"
      - name: conformance
        run: |
          (cd kanonak-canonical/go && go test ./...)
          (cd kanonak-codec/go && go test ./...)
      # Go "publish" = push subdir tags kanonak-canonical/go/vX.Y.Z then kanonak-codec/go/vX.Y.Z;
      # the module proxy fetches on first `go get`. No publish step here (this job runs conformance).

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", registry-url: "https://registry.npmjs.org" }
      - run: cd kanonak-codec/typescript && npm install --no-audit --no-fund && npm run build && npm run typecheck
      - name: publish @kanonak-protocol/codec (npm, provenance)
        if: env.DO_PUBLISH == 'true'
        run: cd kanonak-codec/typescript && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}   # or npm trusted publishing (drop the token)

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "8.0.x" }
      - name: conformance
        run: |
          dotnet run -c Release --project kanonak-canonical/csharp/test/Kanonak.Canonical.Conformance -- "$PWD/kanonak-canonical/vectors"
          dotnet run -c Release --project kanonak-codec/csharp/test/Kanonak.Codec.Conformance -- "$PWD/kanonak-codec/vectors/codec-vectors.json"
      - run: |
          dotnet pack -c Release kanonak-canonical/csharp/src/Kanonak.Canonical/Kanonak.Canonical.csproj
          dotnet pack -c Release kanonak-codec/csharp/src/Kanonak.Codec/Kanonak.Codec.csproj
      - name: push canonical then codec (NuGet)
        if: env.DO_PUBLISH == 'true'
        run: |
          dotnet nuget push "kanonak-canonical/csharp/**/bin/Release/*.nupkg" -k "${{ secrets.NUGET_API_KEY }}" -s https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "kanonak-codec/csharp/**/bin/Release/*.nupkg"     -k "${{ secrets.NUGET_API_KEY }}" -s https://api.nuget.org/v3/index.json --skip-duplicate

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          server-id: central                       # Sonatype Central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: conformance (javac + run against the shared vectors)
        run: |
          cd kanonak-canonical/java
          javac -d out src/main/java/org/kanonak/canonical/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors
          cd ../../kanonak-codec/java
          javac -d out ../../kanonak-canonical/java/src/main/java/org/kanonak/canonical/*.java src/main/java/org/kanonak/codec/*.java conformance/Conformance.java
          java -cp out Conformance ../vectors/codec-vectors.json
      - name: deploy canonical then codec (Maven Central, signed)
        if: env.DO_PUBLISH == 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn -B -f kanonak-canonical/java/pom.xml deploy -P release
          mvn -B -f kanonak-codec/java/pom.xml      deploy -P release
