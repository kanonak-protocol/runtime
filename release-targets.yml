# release-targets.yml
# SINGLE SOURCE OF TRUTH for publishing the Kanonak runtime libraries.
# Every registry connection, account/namespace, auth method, and GitHub Actions
# secret is listed here so there is one place to review what must be set up.
#
# Stack: `canonical` (canonical form + content hash) -> `codec` (depends on it)
# -> `expression` (the expression runtime) -> `wire` (the wire kernel);
# expression and wire are independent of the other members.
# ALWAYS publish canonical before codec; expression and wire can publish any time.

meta:
  source_repo: kanonak-protocol/runtime          # public; build + publish happen here
  homepage: https://kanonak.org
  license: Apache-2.0
  # Per-member versions live in each member's committed manifests (the
  # release-audit source of truth) and diverge per registry as patches ship;
  # go_module_versions below tracks the Go tags per member.
  canonical_form_version: "1"                     # frozen content-address rules
  expression_runtime_version: "1"                 # frozen expression-evaluation rules
  wire_format_version: "1"                        # frozen wire-kernel rules
  publish_order: [canonical, codec, expression, wire]   # expression + wire have no cross-dep; order is loose for them
  # Go module versions â€” the Go "registry" is git tags (`kanonak-<member>/go/v<ver>`)
  # pushed BY the release workflow's publish-go job (NEVER manually; the manual step
  # was forgotten for expression 0.1.0 â€” found 2026-07-03). The module proxy caches a
  # tag IMMUTABLY on first fetch: to release a new Go version, bump the member HERE
  # and re-run the workflow; existing tags are never touched or moved.
  go_module_versions:
    canonical: "0.1.1"
    codec: "0.4.0"
    expression: "0.1.0"
    wire: "0.1.0"
  # GitHub Actions OIDC (no stored token) is preferred where supported. A workflow
  # using OIDC needs:  permissions: { id-token: write, contents: read, attestations: write }
  # All PUBLISH jobs run in the `production` GitHub environment (required by NuGet trusted
  # publishing; used by every trusted publisher for the OIDC claim + release gating).

# ----------------------------------------------------------------------------
# Recommended-path secrets you must create (GitHub > repo > Settings > Secrets):
#   With OIDC trusted publishing on PyPI + crates.io + npm + NuGet, you only need:
#     MAVEN_CENTRAL_PASSWORD      (Sonatype Central Portal pass token)
#     MAVEN_GPG_PRIVATE_KEY       (ASCII-armored signing key)
#     MAVEN_GPG_PASSPHRASE
#   Go needs NO secret (release = a git tag). NuGet needs NO secret with OIDC (NUGET_API_KEY is the fallback).
#
# Token-fallback secrets (only if you choose NOT to use OIDC for these):
#     PYPI_API_TOKEN, CARGO_REGISTRY_TOKEN, NPM_TOKEN
#
# Non-secret config goes in GitHub Actions VARIABLES (Settings > Variables - values
# stay readable, so you can audit which account publishes), NOT Secrets:
#     NUGET_USER = kanonak-oss              (the NuGet publishing account handle)
#     MAVEN_CENTRAL_USERNAME = <token user>  (Sonatype Central token username half)
# Reserve Secrets for true secrets only (tokens / passwords / keys).
# ----------------------------------------------------------------------------

targets:

  - language: python
    registry: PyPI
    registry_url: https://pypi.org
    publishes:
      canonical: kanonak-canonical
      codec: kanonak-codec
      expression: kanonak-expression
      wire: kanonak-wire
    account_namespace: "PyPI account/org that owns both projects (reserve the two names)"
    auth: oidc-trusted-publishing
    github_secrets: []                 # none with OIDC
    fallback_secret: PYPI_API_TOKEN
    registry_side_config:              # set on PyPI, per project, under Publishing
      owner: kanonak-protocol
      repository: runtime
      workflow: release.yml
      environment: production          # publish job runs in this environment
    setup:
      - Reserve projects kanonak-canonical and kanonak-codec on PyPI.
      - Add a Trusted Publisher to each project -> (kanonak-protocol/runtime, release.yml).
    gotchas: []

  - language: rust
    registry: crates.io
    registry_url: https://crates.io
    publishes:
      canonical: kanonak-canonical
      codec: kanonak-codec
      expression: kanonak-expression
      wire: kanonak-wire
    account_namespace: "crates.io account (GitHub-linked) owning both crates"
    auth: oidc-trusted-publishing      # crates.io Trusted Publishing (GA 2025)
    github_secrets: []
    fallback_secret: CARGO_REGISTRY_TOKEN
    registry_side_config:
      owner: kanonak-protocol
      repository: runtime
      workflow: release.yml
      environment: production
    setup:
      - Reserve crate names kanonak-canonical and kanonak-codec.
      - Configure Trusted Publishing on each crate -> this repo + workflow.
    gotchas:
      - "codec depends on canonical via {version, path}; cargo publishes canonical first, then codec resolves it from crates.io."

  - language: typescript
    registry: npm
    registry_url: https://registry.npmjs.org
    publishes:
      canonical: "@kanonak-protocol/canonical"
      codec: "@kanonak-protocol/codec"
      expression: "@kanonak-protocol/expression"
      wire: "@kanonak-protocol/wire"
    account_namespace: "npm org @kanonak-protocol (publisher must be a member with publish rights)"
    auth: oidc-provenance               # --provenance via GitHub OIDC; trusted publishing if enabled
    github_secrets: []                  # OIDC; else NPM_TOKEN
    fallback_secret: NPM_TOKEN
    registry_side_config:
      org: "@kanonak-protocol"
      access: public
      environment: production
    setup:
      - Ensure the @kanonak-protocol npm org exists and the release identity can publish.
      - Publish canonical THEN codec with `npm publish --provenance --access public` (OIDC).
    gotchas:
      - "npm workspace at the repo root; codec depends on @kanonak-protocol/canonical (see codec/typescript/package.json for the floor) - publish canonical first."
      - "IDEMPOTENCY: `npm view` reads a replica that lags a fresh publish by minutes - release.yml also treats the registry's E403 'cannot publish over previously published versions' as already-published (proven 2026-07-03)."

  - language: csharp
    registry: NuGet.org
    registry_url: https://api.nuget.org/v3/index.json
    publishes:
      canonical: Kanonak.Canonical
      codec: Kanonak.Codec
      expression: Kanonak.Expression
      wire: Kanonak.Wire
    account_namespace: "NuGet.org account/org (kanonak-oss); reserve the 'Kanonak.' package-ID prefix"
    auth: oidc-trusted-publishing
    github_secrets: []
    fallback_secret: NUGET_API_KEY
    registry_side_config:
      user: kanonak-oss          # stored as the repo VARIABLE NUGET_USER (not a secret)
      environment: production
    setup:
      - Reserve the Kanonak.* ID prefix on NuGet.org.
      - Add a trusted-publishing policy -> (kanonak-protocol/runtime, release.yml, environment production).
    gotchas:
      - "NuGet trusted publishing REQUIRES a GitHub environment; the publish job runs in `production` and uses NuGet/login@v1 (OIDC -> temp key)."

  - language: java
    registry: Maven Central
    registry_url: https://central.sonatype.com
    publishes:
      canonical: "org.kanonak:kanonak-canonical"
      codec: "org.kanonak:kanonak-codec"
      expression: "org.kanonak:kanonak-expression"
      wire: "org.kanonak:kanonak-wire"
    account_namespace: "Sonatype Central account; verify the org.kanonak namespace"
    auth: portal-token + gpg
    github_variables:
      - MAVEN_CENTRAL_USERNAME      # readable: the Sonatype Central token username
    github_secrets:
      - MAVEN_CENTRAL_PASSWORD
      - MAVEN_GPG_PRIVATE_KEY
      - MAVEN_GPG_PASSPHRASE
    fallback_secret: null
    registry_side_config:
      namespace: org.kanonak
    setup:
      - Register/verify the org.kanonak namespace on Sonatype Central (DNS TXT on kanonak.org).
      - Generate a GPG key, publish the public key to a keyserver, store the private key + passphrase as secrets.
      - Generate a Central Portal user token -> MAVEN_CENTRAL_USERNAME / _PASSWORD.
    gotchas:
      - "Artifacts must be GPG-signed and pass Central validation before release."
      - "IDEMPOTENCY: repo1.maven.org mirrors the Portal with minutes-to-hours lag - release.yml's repo1 pre-check is an optimization only; on deploy failure it queries the Portal status API (Bearer base64(user:pass)) and continues if the deployment failed as a duplicate (proven 2026-07-03)."
      - "PyPI-adjacent reminder: every trusted publisher (PyPI/crates/npm/NuGet) MUST be configured with environment=production or the OIDC claim mismatches and the publish is rejected (bit us on kanonak-wire's first publish)."

  - language: go
    registry: Go module proxy
    registry_url: https://proxy.golang.org
    publishes:
      canonical: github.com/kanonak-protocol/runtime/kanonak-canonical/go
      codec: github.com/kanonak-protocol/runtime/kanonak-codec/go
      expression: github.com/kanonak-protocol/runtime/kanonak-expression/go
      wire: github.com/kanonak-protocol/runtime/kanonak-wire/go
    account_namespace: "none (proxy auto-fetches on first request)"
    auth: none
    github_secrets: []
    fallback_secret: null
    registry_side_config: {}
    setup:
      - "NOTHING manual: the release workflow's publish-go job pushes the subdir semver tags (`kanonak-<member>/go/vX.Y.Z` from meta.go_module_versions); the proxy fetches on first `go get`."
      - Publish canonical's tag first so codec's require resolves from the proxy (the job tags in publish_order).
    gotchas:
      - "GitHub module paths (not a kanonak.org vanity): the monorepo subdir layout is incompatible with vanity import-prefix derivation. codec/go.mod keeps a local replace for monorepo dev; consumers ignore it and resolve canonical v0.1.0 from the proxy."
      - "Go has NO registry uploads and NO GitHub-Release requirement â€” a plain git tag is the release. proxy.golang.org caches a served version FOREVER: never move or reuse a tag; bump meta.go_module_versions instead."
      - "Without a tag, `go get @latest` still resolves â€” to an unpinned pseudo-version (v0.0.0-<date>-<commit>). A missing tag is therefore SILENT drift; the release-audit job hard-fails on it."

  - language: wasm           # Component Model — CODEC ONLY (the 7th codec port)
    registry: GHCR (OCI)
    registry_url: https://ghcr.io
    publishes:
      codec: ghcr.io/kanonak-protocol/codec    # wkg-format Wasm OCI Artifact; tag = the codec version
    account_namespace: "GitHub org kanonak-protocol (co-located with the repo; genuinely public + consumer-independent)"
    auth: github-token         # ambient workflow GITHUB_TOKEN via WKG_OCI_USERNAME/WKG_OCI_PASSWORD (job permissions packages: write)
    github_secrets: []         # none — GITHUB_TOKEN is ambient
    fallback_secret: null
    registry_side_config:
      visibility: public       # ONE-TIME manual flip after the FIRST publish (GHCR creates org packages private)
      linked_repo: kanonak-protocol/runtime   # via the org.opencontainers.image.source annotation on push
    setup:
      - "NOTHING before the first release. AFTER the first publish: org > Packages > codec > package settings > Change visibility > Public — anonymous `wkg oci pull` is the acceptance bar and release-audit hard-fails until this is done."
    gotchas:
      - "The Wasm component has no language-native registry; the Component-Model ecosystem distributes via OCI artifacts (warg is archived). Idiomatic fetch: `wkg oci pull ghcr.io/kanonak-protocol/codec:<ver> -o codec.wasm` (or oras)."
      - "wkg is pinned in release.yml (v0.15.1, latest stable; 0.16 is an RC as of 2026-07-17). The artifact format is wkg's: config application/vnd.wasm.config.v0+json + a single application/wasm layer."
      - "Release tags are immutable by discipline: publish-wasm pre-checks the manifest (authenticated, so it also works pre-visibility-flip) and skips an existing tag; bump the wasm crate version in lockstep with the native codec for a new release."

  - language: swift          # CANONICAL + CODEC (behind the root Package.swift)
    registry: "public git repo + root semver tags (Swift has no central registry)"
    registry_url: https://github.com/kanonak-protocol/runtime
    publishes:
      canonical: "product KanonakCanonical (root Package.swift)"
      codec: "product KanonakCodec (root Package.swift)"
    account_namespace: "GitHub org kanonak-protocol (the repo IS the registry)"
    auth: none                 # a release is the repo's coordinated `v*` tag; no upload exists
    github_secrets: []
    fallback_secret: null
    registry_side_config: {}
    setup:
      - "NOTHING: SwiftPM resolves the repo URL against ROOT semver tags (`v*`), so the coordinated release tag IS the Swift release — no publish job. test-swift gates the tag."
    gotchas:
      - "SwiftPM understands ONLY root-level semver tags — the per-member Go-style tags (kanonak-codec/go/vX) are invisible to it, and every root `v*` tag IS a Swift package version. Tags v0.2.0-v0.4.0 predate Package.swift and cannot resolve; the first Swift-consumable version is the first tag whose tree contains it. Consumers must pin `from:` at or above that version."
      - "One Swift package version covers ALL members (root manifest), unlike the per-member versions elsewhere — the repo's coordinated `v*` release train is the Swift version line."
      - "The package identity a consumer writes is the URL basename: `.package(url: \"https://github.com/kanonak-protocol/runtime\", ...)` + products KanonakCanonical / KanonakCodec."
      - "Optional discoverability: swiftpackageindex.com indexes public repos (it is an index, not a registry); nothing depends on it."
